{{ define "main" }}
<article style="max-width:680px;margin:60px auto;padding:0 20px">
  <h1 style="font-family:'Playfair Display',serif;font-size:36px;color:#e8e4dc;margin-bottom:16px">
    {{ .Title }}
  </h1>
  <div style="font-size:13px;color:rgba(232,228,220,0.4);margin-bottom:40px">
    {{ .Date.Format "January 2, 2006" }}
  </div>
  <div style="font-size:16px;color:rgba(232,228,220,0.7);line-height:1.9">
    {{ .Content }}
  </div>
</article>
{{ end }}
